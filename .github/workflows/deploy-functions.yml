name: Deploy Supabase Functions

on:
  push:
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: ufksgrounhmfafdajbrr
    steps:
      - uses: actions/checkout@v3
      
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy meta-auth
        run: supabase functions deploy meta-auth --project-ref $PROJECT_ID --no-verify-jwt

      - name: Deploy meta-api
        run: supabase functions deploy meta-api --project-ref $PROJECT_ID --no-verify-jwt
